name: "QModem Testing - aarch64_generic"
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - quick

env:
  TZ: Asia/Shanghai
  SDK_NAME: openwrt-sdk-23.05.5-armsr-armv8_gcc-12.3.0_musl.Linux-x86_64
  SDK_EXT: tar.xz
  SDK_URL: https://downloads.openwrt.org/releases/23.05.5/targets/armsr/armv8/
  SDK_ARCH: aarch64_generic

jobs:
  build_qmodem_testing:
    name: Build QModem-Next (aarch64_generic) with eSIM + Intel NCM
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install zstd build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-venv rsync unzip zlib1g-dev file wget
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: 'qmodem'

      - name: Cache openwrt SDK
        id: cache-sdk
        uses: actions/cache@v3
        with:
          path: sdk
          key: openwrt-sdk-aarch64-generic-testing

      - name: Download and setup SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          wget ${{ env.SDK_URL }}${{ env.SDK_NAME }}.${{ env.SDK_EXT }}
          mkdir sdk && tar -xvf ${{ env.SDK_NAME }}.${{ env.SDK_EXT }} -C ./sdk --strip-components=1
          cd sdk
          echo "src-git base https://github.com/openwrt/openwrt.git;main" > feeds.conf
          echo "src-git packages https://github.com/openwrt/packages.git;master" >> feeds.conf
          echo "src-git luci https://github.com/openwrt/luci.git;master" >> feeds.conf
          echo "src-git routing https://git.openwrt.org/feed/routing.git;master" >> feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Setup QModem feed
        run: |
          echo "src-link qmodem $(pwd)/qmodem" >> sdk/feeds.conf
          cd sdk
          ./scripts/feeds update qmodem
          ./scripts/feeds install -a -p qmodem

      - name: Configure build
        run: |
          cd sdk
          cat > .config << 'EOF'
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_ALL=n
          CONFIG_AUTOREMOVE=n
          CONFIG_LUCI_LANG_zh_Hans=y
          # QModem-Next (pure JS LuCI frontend)
          CONFIG_PACKAGE_luci-app-qmodem-next=m
          # QModem core with customized quectel-CM
          CONFIG_PACKAGE_qmodem=m
          CONFIG_PACKAGE_luci-app-qmodem=m
          CONFIG_PACKAGE_luci-app-qmodem_USE_TOM_CUSTOMIZED_QUECTEL_CM=y
          CONFIG_PACKAGE_luci-app-qmodem_INCLUDE_generic-qmi-wwan=y
          # eSIM support (lpac + lpac-manager)
          CONFIG_PACKAGE_luci-app-lpac-manager=m
          CONFIG_PACKAGE_lpac=m
          # Connection managers
          CONFIG_PACKAGE_quectel-CM-5G-M=m
          CONFIG_PACKAGE_tom_modem=m
          CONFIG_PACKAGE_tom_modem_EARLY_RETURN=y
          CONFIG_PACKAGE_tom_modem_ENABLE_UBUS_DAEMON=y
          CONFIG_PACKAGE_ubus-at-daemon=m
          # SMS
          CONFIG_PACKAGE_luci-app-qmodem-sms=m
          # eSIM bot
          CONFIG_PACKAGE_qmodem-esim-bot=m
          # Translations
          CONFIG_PACKAGE_luci-i18n-qmodem-zh-cn=m
          CONFIG_PACKAGE_luci-i18n-qmodem-sms-zh-cn=m
          EOF
          sed -i 's/^          //' .config
          make defconfig
          make download -j$(nproc) || true

      - name: Compile QModem packages
        id: compile
        run: |
          cd sdk
          ./scripts/feeds update qmodem
          ./scripts/feeds install -a -p qmodem

          # Compile generic packages (platform-independent)
          for package in luci-app-qmodem luci-app-qmodem-sms luci-app-qmodem-next luci-app-lpac-manager qmodem qmodem-esim-bot; do
            echo "=== Compiling $package ==="
            make package/$package/compile -j$(nproc) || echo "WARNING: $package failed"
          done

          # Compile arch-specific packages
          for package in tom_modem quectel_CM_5G ubus_at_daemon sms_forwarder lpac; do
            echo "=== Compiling $package ==="
            make package/$package/compile -j$(nproc) || echo "WARNING: $package failed"
          done

          echo "=== Build output ==="
          ls -la bin/packages/${{ env.SDK_ARCH }}/qmodem/ 2>/dev/null || echo "No qmodem packages found"
          echo "status=success" >> $GITHUB_OUTPUT
          echo "FIRMWARE=$(pwd)/bin/packages/${{ env.SDK_ARCH }}/qmodem/" >> $GITHUB_ENV

      - name: Verify Intel L850/L860 NCM patch is included
        run: |
          echo "=== Verifying Intel NCM dial patch ==="
          if grep -q "AT+XDATACHANNEL" qmodem/application/qmodem/files/usr/share/qmodem/modem_dial.sh; then
            echo "✅ Intel NCM data channel binding (AT+XDATACHANNEL) present in modem_dial.sh"
          else
            echo "❌ ERROR: Intel NCM patch missing from modem_dial.sh"
            exit 1
          fi

          if grep -q '"intel"' qmodem/application/qmodem/files/usr/share/qmodem/vendor/fibocom.sh; then
            echo "✅ Intel platform support present in fibocom.sh"
          else
            echo "❌ ERROR: Intel platform missing from fibocom.sh"
            exit 1
          fi

          if grep -q '"l850-gl"' qmodem/application/qmodem/files/usr/share/qmodem/modem_support.json; then
            echo "✅ L850-GL entry present in modem_support.json"
          else
            echo "❌ ERROR: L850-GL missing from modem_support.json"
            exit 1
          fi

          if grep -q 'AT+XACT' qmodem/application/qmodem/files/usr/share/qmodem/vendor/fibocom.sh; then
            echo "✅ Intel band locking (AT+XACT) present in fibocom.sh"
          else
            echo "❌ ERROR: AT+XACT band locking missing from fibocom.sh"
            exit 1
          fi

          echo "=== Verifying eSIM support ==="
          if [ -d "qmodem/lpac" ]; then
            echo "✅ lpac eSIM directory present"
          else
            echo "❌ ERROR: lpac directory missing"
            exit 1
          fi

          if [ -f "qmodem/luci/luci-app-lpac-manager/Makefile" ]; then
            echo "✅ luci-app-lpac-manager present"
          else
            echo "❌ ERROR: luci-app-lpac-manager missing"
            exit 1
          fi

          echo ""
          echo "=== All verification checks passed ==="

      - name: Run unit tests
        run: |
          cd qmodem
          echo "=== Running Intel modem support tests ==="
          bash tests/test_intel_json_registry.sh
          bash tests/test_intel_match_config.sh
          bash tests/test_intel_mode.sh
          bash tests/test_intel_signal.sh
          echo ""
          echo "=== All tests passed ==="

      - name: Upload QModem packages
        if: ${{ steps.compile.outputs.status == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: QModem-Testing-aarch64_generic
          path: ${{ env.FIRMWARE }}*
          retention-days: 14
