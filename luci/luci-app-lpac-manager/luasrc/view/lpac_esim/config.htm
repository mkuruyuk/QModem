<!-- /usr/lib/lua/luci/view/lpac_esim/config.htm -->

<div id="config-loading" style="text-align: center; padding: 20px;">
    <%:Loading configuration...%>
</div>

<div id="config-content" style="display: none;">
    <fieldset class="cbi-section">
        <legend><%:APDU Backend%></legend>
        <div class="cbi-section-node">
            <div class="cbi-value">
                <label class="cbi-value-title"><%:Backend Type%></label>
                <div class="cbi-value-field">
                    <select id="cfg-apdu-backend" class="cbi-input-select" onchange="onBackendChange()">
                        <option value="qmi">QMI</option>
                        <option value="at">AT</option>
                        <option value="mbim">MBIM</option>
                    </select>
                    <div class="cbi-value-description"><%:QMI is primary, AT is fallback. MBIM pending lpac recompilation.%></div>
                </div>
            </div>
        </div>
    </fieldset>

    <fieldset class="cbi-section">
        <legend><%:Device Settings%></legend>
        <div class="cbi-section-node">
            <div class="cbi-value" id="cfg-qmi-device-row">
                <label class="cbi-value-title"><%:QMI Device%></label>
                <div class="cbi-value-field">
                    <input type="text" id="cfg-qmi-device" class="cbi-input-text" placeholder="/dev/cdc-wdm0" />
                </div>
            </div>
            <div class="cbi-value" id="cfg-qmi-slot-row">
                <label class="cbi-value-title"><%:QMI SIM Slot%></label>
                <div class="cbi-value-field">
                    <select id="cfg-qmi-slot" class="cbi-input-select">
                        <option value="1">Slot 1</option>
                        <option value="2">Slot 2</option>
                    </select>
                </div>
            </div>
            <div class="cbi-value" id="cfg-at-device-row">
                <label class="cbi-value-title"><%:AT Device%></label>
                <div class="cbi-value-field">
                    <input type="text" id="cfg-at-device" class="cbi-input-text" placeholder="/dev/ttyUSB3" />
                </div>
            </div>
            <div class="cbi-value" id="cfg-mbim-device-row" style="display: none;">
                <label class="cbi-value-title"><%:MBIM Device%></label>
                <div class="cbi-value-field">
                    <input type="text" id="cfg-mbim-device" class="cbi-input-text" placeholder="/dev/cdc-wdm0" />
                </div>
            </div>
            <div class="cbi-value" id="cfg-mbim-proxy-row" style="display: none;">
                <label class="cbi-value-title"><%:MBIM Proxy%></label>
                <div class="cbi-value-field">
                    <select id="cfg-mbim-proxy" class="cbi-input-select">
                        <option value="0"><%:Disabled%></option>
                        <option value="1"><%:Enabled%></option>
                    </select>
                </div>
            </div>
        </div>
    </fieldset>

    <fieldset class="cbi-section">
        <legend><%:Modem Reboot%></legend>
        <div class="cbi-section-node">
            <div class="cbi-value">
                <label class="cbi-value-title"><%:Reboot Method%></label>
                <div class="cbi-value-field">
                    <select id="cfg-reboot-method" class="cbi-input-select">
                        <option value="script"><%:Auto (script cascade: QMI → AT → USB)%></option>
                    </select>
                    <div class="cbi-value-description"><%:lpac-esim handles reboot automatically with 3-level cascade.%></div>
                </div>
            </div>
        </div>
    </fieldset>

    <fieldset class="cbi-section">
        <legend><%:Debug%></legend>
        <div class="cbi-section-node">
            <div class="cbi-value">
                <label class="cbi-value-title"><%:APDU Debug%></label>
                <div class="cbi-value-field">
                    <select id="cfg-apdu-debug" class="cbi-input-select">
                        <option value="0"><%:Disabled%></option>
                        <option value="1"><%:Enabled%></option>
                    </select>
                </div>
            </div>
            <div class="cbi-value">
                <label class="cbi-value-title"><%:HTTP Debug%></label>
                <div class="cbi-value-field">
                    <select id="cfg-http-debug" class="cbi-input-select">
                        <option value="0"><%:Disabled%></option>
                        <option value="1"><%:Enabled%></option>
                    </select>
                </div>
            </div>
            <div class="cbi-value">
                <label class="cbi-value-title"><%:AT Debug%></label>
                <div class="cbi-value-field">
                    <select id="cfg-at-debug" class="cbi-input-select">
                        <option value="0"><%:Disabled%></option>
                        <option value="1"><%:Enabled%></option>
                    </select>
                </div>
            </div>
        </div>
    </fieldset>

    <div class="cbi-page-custom-actions">
        <input type="button" class="cbi-button cbi-button-apply" value="<%:Save & Apply%>" onclick="saveConfig()" />
        <input type="button" class="cbi-button cbi-button-reset" value="<%:Reset%>" onclick="loadConfig()" />
    </div>
</div>

<div id="config-error" style="display: none; color: red; padding: 10px;">
    <strong><%:Error%>:</strong> <span id="config-error-message"></span>
</div>

<div id="config-success" style="display: none; color: green; padding: 10px;">
    <strong><%:Success%>:</strong> <span id="config-success-message"></span>
</div>

<script type="text/javascript" src="<%=resource%>/lpac-esim/js/lpac-esim-config.js"></script>
